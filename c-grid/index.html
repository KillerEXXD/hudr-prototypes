<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="HUDR Grid">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="description" content="HUDR Grid - Dashboard-first poker tournament analytics">
  <title>HUDR - The Grid</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Header Bar -->
    <header class="header-bar" id="headerBar">
      <div class="header-left">
        <span class="header-logo">HUDR</span>
      </div>
      <div class="header-center">
        <button class="tournament-selector" id="tournamentSelector">
          <span class="tournament-name" id="tournamentName">WSOP Main Event</span>
          <svg class="chevron-icon" width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M3 4.5L6 7.5L9 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <!-- Dropdown -->
        <div class="tournament-dropdown" id="tournamentDropdown">
          <div class="dropdown-list" id="dropdownList"></div>
        </div>
      </div>
      <div class="header-right">
        <button class="notification-bell" id="notificationBell">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M15 6.667a5 5 0 00-10 0c0 5.833-2.5 7.5-2.5 7.5h15S15 12.5 15 6.667z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M11.442 16.667a1.667 1.667 0 01-2.884 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="bell-badge">3</span>
        </button>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main-content" id="mainContent"></main>

    <!-- Hand Replay Modal -->
    <div class="replay-modal" id="replayModal">
      <div class="replay-content" id="replayContent"></div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav" id="bottomNav">
      <button class="nav-item active" data-screen="dashboard">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <rect x="2" y="2" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
          <rect x="13" y="2" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
          <rect x="2" y="13" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
          <rect x="13" y="13" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
        </svg>
        <span>Dashboard</span>
      </button>
      <button class="nav-item" data-screen="search">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <circle cx="10" cy="10" r="6.5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M14.5 14.5L19 19" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span>Search</span>
      </button>
      <button class="nav-item" data-screen="profile">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <circle cx="11" cy="8" r="4" stroke="currentColor" stroke-width="1.5"/>
          <path d="M3 20c0-3.314 3.582-6 8-6s8 2.686 8 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span>Profile</span>
      </button>
    </nav>
  </div>

  <script src="../shared/data.js"></script>
  <script src="app.js"></script>
</body>
</html>
