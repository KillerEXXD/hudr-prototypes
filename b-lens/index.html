<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>HUDR - The Lens</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Context Header (persistent when in tournament) -->
    <header id="context-header" class="context-header hidden">
      <button id="hamburger-btn" class="header-btn" aria-label="Menu">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <div class="header-title" id="header-title">Tournament</div>
      <div class="header-actions">
        <button id="header-fav-btn" class="header-btn" aria-label="Favorite">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
        </button>
        <button id="header-share-btn" class="header-btn" aria-label="Share">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Panel Dots -->
    <div id="panel-dots" class="panel-dots hidden">
      <span class="dot active" data-panel="0"></span>
      <span class="dot" data-panel="1"></span>
      <span class="dot" data-panel="2"></span>
      <span class="dot" data-panel="3"></span>
      <div class="dot-labels">
        <span class="dot-label active" data-panel="0">Overview</span>
        <span class="dot-label" data-panel="1">Players</span>
        <span class="dot-label" data-panel="2">Hands</span>
        <span class="dot-label" data-panel="3">AI</span>
      </div>
    </div>

    <!-- Main Content Area -->
    <main id="main-content">
      <!-- Home Screen -->
      <div id="screen-home" class="screen"></div>

      <!-- Tournament Context (Swipeable Panels) -->
      <div id="screen-tournament" class="screen hidden">
        <div id="panels-wrapper" class="panels-wrapper">
          <div id="panel-overview" class="panel"></div>
          <div id="panel-players" class="panel"></div>
          <div id="panel-hands" class="panel"></div>
          <div id="panel-ai" class="panel"></div>
        </div>
      </div>

      <!-- Hand Replay Screen -->
      <div id="screen-hand" class="screen hidden"></div>

      <!-- Player Profile Screen -->
      <div id="screen-player" class="screen hidden"></div>

      <!-- Search Screen -->
      <div id="screen-search" class="screen hidden"></div>

      <!-- Favorites Screen -->
      <div id="screen-favorites" class="screen hidden"></div>
    </main>

    <!-- Player Overlay (half-sheet) -->
    <div id="player-overlay" class="player-overlay hidden">
      <div class="overlay-backdrop"></div>
      <div class="overlay-sheet" id="overlay-sheet">
        <div class="overlay-handle"></div>
        <div id="overlay-content" class="overlay-content"></div>
      </div>
    </div>

    <!-- Sidebar Drawer -->
    <div id="sidebar" class="sidebar-container hidden">
      <div class="sidebar-backdrop" id="sidebar-backdrop"></div>
      <nav class="sidebar" id="sidebar-nav">
        <div class="sidebar-header">
          <div class="sidebar-logo">HUDR</div>
          <button id="sidebar-close" class="header-btn" aria-label="Close">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <div id="sidebar-content" class="sidebar-content"></div>
      </nav>
    </div>

    <!-- Bottom Navigation -->
    <nav id="bottom-nav" class="bottom-nav">
      <button class="nav-item active" data-screen="home">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        <span>Home</span>
      </button>
      <button class="nav-item" data-screen="search">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <span>Search</span>
      </button>
      <button class="nav-item" data-screen="favorites">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
        <span>Favorites</span>
      </button>
    </nav>
  </div>

  <script src="../shared/data.js"></script>
  <script src="app.js"></script>
</body>
</html>
